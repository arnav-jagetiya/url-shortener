spring:
  application:
    name: url-shortener
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:url_shortener}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:db_user_placeholder}
    password: ${DB_PASSWORD:db_password_placeholder}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Custom Application / Security settings
app:
  jwt:
    secret: ${JWT_SECRET:jwt_secret_placeholder}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours in ms
