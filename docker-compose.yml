version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: url-shortener-mysql
    restart: always
    environment:
      MYSQL_DATABASE: url_shortener
      MYSQL_USER: shrt_user
      MYSQL_PASSWORD: shrt_password_123
      MYSQL_ROOT_PASSWORD: root_password_123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.0-alpine
    container_name: url-shortener-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - url-shortener-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url-shortener-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: url_shortener
      DB_USERNAME: shrt_user
      DB_PASSWORD: shrt_password_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: 9a4f2c8d3b7a1e5f8c3d2e1a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - url-shortener-net

volumes:
  mysql_data:

networks:
  url-shortener-net:
    driver: bridge
