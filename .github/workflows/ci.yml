name: Java CI with Maven

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: url_shortener
          MYSQL_USER: shrt_user
          MYSQL_PASSWORD: shrt_password_123
          MYSQL_ROOT_PASSWORD: root_password_123
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (Compile, Test & Package)
      run: mvn -B clean package
      env:
        DB_HOST: localhost
        DB_PORT: 3306
        DB_NAME: url_shortener
        DB_USERNAME: shrt_user
        DB_PASSWORD: shrt_password_123
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: 9a4f2c8d3b7a1e5f8c3d2e1a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c
        JWT_EXPIRATION_MS: 86400000

    - name: Validate Docker Compose Configuration
      run: docker compose config

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile
        push: false
        tags: url-shortener-app:latest
